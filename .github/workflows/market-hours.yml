name: Market Hours Schedule
on:
  schedule:
    - cron: '45 3 * * 1-5'  # 9:15 AM IST (Mon-Fri)
    - cron: '55 9 * * 1-5'  # 3:25 PM IST (Mon-Fri)
  workflow_dispatch: # Allow manual trigger

jobs:
  manage-fly:
    name: Manage Fly.io Scale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Scale Fly.io Machine
        run: |
          # Get current UTC hour and minute
          HOUR=$(date +%H)
          MINUTE=$(date +%M)
          
          echo "Current UTC time: $HOUR:$MINUTE"
          
          # 03:45 UTC is 9:15 AM IST
          # 09:55 UTC is 3:25 PM IST
          
          if [ "$HOUR" -lt 06 ]; then
            echo "Time is before 06:00 UTC. Scaling UP to 1 machine."
            flyctl scale count 1 --yes
          else
            echo "Time is after 06:00 UTC. Scaling DOWN to 0 machines."
            flyctl scale count 0 --yes
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
