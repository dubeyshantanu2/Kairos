name: Fly App Schedule

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action (start or stop)'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop
  schedule:
    - cron: '30 3 * * 1-5' # 9:00 AM IST
    - cron: '0 10 * * 1-5' # 3:30 PM IST

jobs:
  scale-app:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Start App (9:00 AM IST)
        if: github.event.schedule == '30 3 * * 1-5' || github.event.inputs.action == 'start'
        run: flyctl scale count 1 -a kairos-yxfydw --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          
      - name: Stop App (3:30 PM IST)
        if: github.event.schedule == '0 10 * * 1-5' || github.event.inputs.action == 'stop'
        run: flyctl scale count 0 -a kairos-yxfydw --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
